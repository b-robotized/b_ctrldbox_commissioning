b_controlled_box_cm:
  ros__parameters:
    update_rate: 1000  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    fr3_left_joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    fr3_right_joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    fr3_joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

joint_state_broadcaster:
  ros__parameters:
    type: joint_state_broadcaster/JointStateBroadcaster

fr3_left_joint_trajectory_controller:
  ros__parameters:
    type: joint_trajectory_controller/JointTrajectoryController
    update_rate: 1000
    command_interfaces:
      - effort
    state_interfaces:
      - position
      - velocity
    joints:
      - fr3_left_joint1
      - fr3_left_joint2
      - fr3_left_joint3
      - fr3_left_joint4
      - fr3_left_joint5
      - fr3_left_joint6
      - fr3_left_joint7
    gains:
      fr3_left_joint1: { p: 600., d: 30., i: 0., i_clamp: 1. }
      fr3_left_joint2: { p: 600., d: 30., i: 0., i_clamp: 1. }
      fr3_left_joint3: { p: 600., d: 30., i: 0., i_clamp: 1. }
      fr3_left_joint4: { p: 600., d: 30., i: 0., i_clamp: 1. }
      fr3_left_joint5: { p: 250., d: 10., i: 0., i_clamp: 1. }
      fr3_left_joint6: { p: 150., d: 10., i: 0., i_clamp: 1. }
      fr3_left_joint7: { p: 50., d: 5., i: 0., i_clamp: 1. }

    state_publish_rate: 50.0
    action_monitor_rate: 20.0

    interpolate_from_desired_state: true
    allow_partial_joints_goal: false
    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 0.0

