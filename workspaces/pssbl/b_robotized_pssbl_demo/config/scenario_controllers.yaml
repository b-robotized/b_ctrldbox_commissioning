b_controlled_box_cm:
  ros__parameters:
    update_rate: 100  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    tool_controller:
      type: gpio_tool_controller/GpioToolController

joint_state_broadcaster:
  ros__parameters:
    type: joint_state_broadcaster/JointStateBroadcaster

joint_trajectory_controller:
  ros__parameters:
    type: joint_trajectory_controller/JointTrajectoryController
    joints:
      - joint1
      - joint2
      - joint3
      - joint4
      - joint5
      - joint6


    command_interfaces:
      - position
    state_interfaces:
      - position

    state_publish_rate: 50.0 # Defaults to 50
    action_monitor_rate: 20.0 # Defaults to 20

    interpolate_from_desired_state: true
    allow_partial_joints_goal: false # Defaults to false
    constraints:
      stopped_velocity_tolerance: 0.01 # Defaults to 0.01
      goal_time: 0.0 # Defaults to 0.0 (start immediately)

tool_controller:
  ros__parameters:
    type: gpio_tool_controller/GpioToolController
    use_action: true
    IDLE_recheck_state: false # will the controller check state only on requested change, or every loop in idle. Default: false
    timeout: 5.0
    tolerance: 0.01

    disengaged:
      name: 'disengaged'
      command:
        interfaces: ["orba6_gripper/engage", "orba6_gripper/disengage"]
        values: [0.0, 1.0]
      states:
        interfaces: ["orba6_gripper/engage", "orba6_gripper/disengage", "orba6_gripper/part_present"]
        values: [0.0, 1.0, 0.0]

    possible_engaged_states: ['engaged_empty', 'engaged_part_present']

    engaged:
      name: 'engaged'
      command:
        interfaces: ["orba6_gripper/engage", "orba6_gripper/disengage"]
        values: [1.0, 0.0]
      states:
        engaged_empty:
          interfaces: ["orba6_gripper/engage", "orba6_gripper/disengage", "orba6_gripper/part_present"]
          values: [1.0, 0.0, 0.0]
        engaged_part_present:
          interfaces: ["orba6_gripper/engage", "orba6_gripper/disengage", "orba6_gripper/part_present"]
          values: [1.0, 0.0, 1.0]


io_controller:
  ros__parameters:
    type: gpio_controllers/GpioCommandController
    gpios:
      - orba6_digital_inputs
      - orba6_digital_outputs
    command_interfaces:
      orba6_digital_outputs:
        - interfaces:
          - channel_1
          - channel_2
          - channel_3
          - channel_4
          - channel_5
          - channel_6
          - channel_7
          - channel_8
          - channel_9
          - channel_10
          - channel_11
          - channel_12
          - channel_13
          - channel_14
          - channel_15
          - channel_16
    state_interfaces:
      orba6_digital_inputs:
        - interfaces:
          - channel_1
          - channel_2
          - channel_3
          - channel_4
          - channel_5
          - channel_6
          - channel_7
          - channel_8
          - channel_9
          - channel_10
          - channel_11
          - channel_12
          - channel_13
          - channel_14
          - channel_15
          - channel_16
      orba6_digital_outputs:  # virtual interfaces for checking states
        - interfaces:
          - channel_1
          - channel_2
          - channel_3
          - channel_4
          - channel_5
          - channel_6
          - channel_7
          - channel_8
          - channel_9
          - channel_10
          - channel_11
          - channel_12
          - channel_13
          - channel_14
          - channel_15
          - channel_16
